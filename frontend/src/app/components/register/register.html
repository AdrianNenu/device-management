<div class="auth-bg">
  <div class="auth-split">

    <div class="auth-brand">
      <div class="brand-logo">
        <svg viewBox="0 0 16 16" fill="white" width="20" height="20">
          <path d="M2 3a1 1 0 011-1h10a1 1 0 011 1v7a1 1 0 01-1 1H3a1 1 0 01-1-1V3zm1 0v7h10V3H3zm2 9h6v1H5v-1z"/>
        </svg>
      </div>
      <div class="brand-name">DeviceHub</div>
      <p class="brand-desc">Create your account and start managing your company's devices in minutes.</p>
    </div>

    <div class="auth-form-wrap">
      <div class="auth-card">
        <div class="auth-header">
          <h1>Create account</h1>
          <p>Fill in your details to get started</p>
        </div>

        <div class="err-banner" *ngIf="serverError">{{ serverError }}</div>

        <div class="field-row">
          <div class="field">
            <label>Full name</label>
            <input [(ngModel)]="name"
                   (blur)="validateName()"
                   (ngModelChange)="onNameChange()"
                   placeholder="Jane Smith"
                   [class.input-error]="nameError">
            <span class="err-msg" *ngIf="nameError">{{ nameError }}</span>
          </div>
          <div class="field">
            <label>Location</label>
            <input [(ngModel)]="location"
                   (blur)="validateLocation()"
                   (ngModelChange)="onLocationChange()"
                   placeholder="e.g. London"
                   [class.input-error]="locationError">
            <span class="err-msg" *ngIf="locationError">{{ locationError }}</span>
          </div>
        </div>

        <div class="field">
          <label>Email address</label>
          <input type="email"
                 [(ngModel)]="email"
                 (blur)="validateEmail()"
                 (ngModelChange)="onEmailChange()"
                 placeholder="you@company.com"
                 [class.input-error]="emailError">
          <span class="err-msg" *ngIf="emailError">{{ emailError }}</span>
        </div>

        <div class="field">
          <label>Password</label>
          <input type="password"
                 [(ngModel)]="password"
                 (blur)="validatePassword()"
                 (ngModelChange)="onPasswordChange()"
                 placeholder="••••••••"
                 [class.input-error]="passwordError">
          <span class="err-msg" *ngIf="passwordError">{{ passwordError }}</span>
        </div>

        <button class="btn-submit" (click)="submit()" [disabled]="submitting">
          {{ submitting ? 'Creating account…' : 'Create account' }}
        </button>

        <p class="switch">Already have an account? <a routerLink="/login">Sign in</a></p>
      </div>
    </div>

  </div>
</div>
