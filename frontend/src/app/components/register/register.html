<div class="auth-container">
  <div class="auth-card">
    <h1>Create account</h1>
    <p class="subtitle">Device Management System</p>

    <div *ngIf="error" class="error-msg">{{ error }}</div>

    <div class="field">
      <label>Full Name</label>
      <input [(ngModel)]="name" placeholder="John Smith" />
    </div>
    <div class="field">
      <label>Email</label>
      <input type="email" [(ngModel)]="email" placeholder="you@example.com" />
    </div>
    <div class="field">
      <label>Password</label>
      <input type="password" [(ngModel)]="password" placeholder="••••••••" />
    </div>
    <div class="field">
      <label>Role</label>
      <select [(ngModel)]="role">
        <option value="Employee">Employee</option>
        <option value="Manager">Manager</option>
        <option value="Admin">Admin</option>
      </select>
    </div>
    <div class="field">
      <label>Location</label>
      <input [(ngModel)]="location" placeholder="e.g. London" />
    </div>

    <button class="btn-primary" (click)="submit()" [disabled]="submitting">
      {{ submitting ? 'Creating account...' : 'Create account' }}
    </button>

    <p class="switch">Already have an account? <a routerLink="/login">Sign in</a></p>
  </div>
</div>
