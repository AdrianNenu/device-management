<div class="page-shell">
  <aside class="sidebar">
    <div class="logo">
      <div class="logo-icon"><app-icon name="devices" [size]="15" [fill]="true" style="color:white"/></div>
      <div><div class="logo-text">DeviceHub</div><div class="logo-sub">Management Console</div></div>
    </div>
    <nav class="nav">
      <div class="nav-section">Inventory</div>
      <div class="nav-item" (click)="back()">
        <app-icon name="all" [fill]="true"/> All devices
      </div>
    </nav>
  </aside>

  <div class="main">
    <div class="topbar">
      <button class="back-btn" (click)="back()"><app-icon name="back"/></button>
      <span class="topbar-title">{{ isEdit ? 'Edit device' : 'Add device' }}</span>
      <div class="topbar-error" *ngIf="serverError">{{ serverError }}</div>
    </div>

    <div class="form-content" *ngIf="!loading">
      <form [formGroup]="deviceForm" (ngSubmit)="submit()">
        <div class="form-layout">

          <div class="form-card">
            <div class="card-header">
              <div class="card-title">Device details</div>
              <div class="card-sub">Basic information about the device</div>
            </div>
            <div class="fields">
              <div class="field-row">
                <div class="field">
                  <label class="field-label">Name</label>
                  <input class="field-input" formControlName="name" placeholder="e.g. iPhone 15 Pro"
                         [class.input-error]="isInvalid('name')">
                  <span class="err-msg" *ngIf="isInvalid('name')">Required</span>
                </div>
                <div class="field">
                  <label class="field-label">Manufacturer</label>
                  <input class="field-input" formControlName="manufacturer" placeholder="e.g. Apple"
                         [class.input-error]="isInvalid('manufacturer')">
                  <span class="err-msg" *ngIf="isInvalid('manufacturer')">Required</span>
                </div>
              </div>
              <div class="field-row">
                <div class="field">
                  <label class="field-label">Type</label>
                  <select class="field-input field-select" formControlName="type"
                          [class.input-error]="isInvalid('type')">
                    <option value="" disabled>Select type</option>
                    <option value="Phone">Phone</option>
                    <option value="Tablet">Tablet</option>
                  </select>
                  <span class="err-msg" *ngIf="isInvalid('type')">Required</span>
                </div>
                <div class="field">
                  <label class="field-label">RAM (GB)</label>
                  <input class="field-input" formControlName="ram" type="number" placeholder="e.g. 8"
                         [class.input-error]="isInvalid('ram')">
                  <span class="err-msg" *ngIf="deviceForm.get('ram')?.hasError('required') && deviceForm.get('ram')?.touched">Required</span>
                  <span class="err-msg" *ngIf="(deviceForm.get('ram')?.hasError('min') || deviceForm.get('ram')?.hasError('max')) && deviceForm.get('ram')?.touched">Must be 1–128 GB</span>
                </div>
              </div>
              <div class="field-row">
                <div class="field">
                  <label class="field-label">Operating system</label>
                  <input class="field-input" formControlName="os" placeholder="e.g. iOS"
                         [class.input-error]="isInvalid('os')">
                  <span class="err-msg" *ngIf="isInvalid('os')">Required</span>
                </div>
                <div class="field">
                  <label class="field-label">OS version</label>
                  <input class="field-input" formControlName="osVersion" placeholder="e.g. 17.4"
                         [class.input-error]="isInvalid('osVersion')">
                  <span class="err-msg" *ngIf="isInvalid('osVersion')">Required</span>
                </div>
              </div>
              <div class="field">
                <label class="field-label">Processor</label>
                <input class="field-input" formControlName="processor" placeholder="e.g. A17 Pro"
                       [class.input-error]="isInvalid('processor')">
                <span class="err-msg" *ngIf="isInvalid('processor')">Required</span>
              </div>
            </div>
          </div>

          <div class="form-card">
            <div class="card-header">
              <div class="card-title">Description</div>
              <div class="card-sub">Optional summary of the device</div>
            </div>
            <div class="fields">
              <div class="desc-actions">
                <button type="button" class="btn btn-ai" (click)="generateDescription()" [disabled]="generatingDesc">
                  <app-icon name="ai"/>
                  {{ generatingDesc ? 'Generating…' : 'Auto-generate with AI' }}
                </button>
              </div>
              <div class="field">
                <textarea class="field-input field-textarea" formControlName="description"
                          rows="8" placeholder="A concise description of the device…"></textarea>
              </div>
            </div>
          </div>

        </div>

        <div class="form-actions">
          <button type="button" class="btn" (click)="back()">Cancel</button>
          <button type="submit" class="btn btn-primary" [disabled]="submitting">
            {{ submitting ? 'Saving…' : (isEdit ? 'Save changes' : 'Add device') }}
          </button>
        </div>
      </form>
    </div>

    <div class="loading-full" *ngIf="loading"><div class="spinner"></div></div>
  </div>
</div>
